[tools]
"go:gotest.tools/gotestsum" = "latest"
goreleaser = "latest"
svu = "latest"

[tasks."."]
description = "Runs the app"
run = "go run ./cmd/themectl"

[tasks.build]
description = "Compile the themectl binary"
run = "go build -o themectl ./cmd/themectl"

[tasks.install]
description = "Build, install to /usr/local/bin, and refresh fish completions"
depends = ["build"]
run = """
sudo mv -f themectl /usr/local/bin/themectl
themectl completion fish > ~/.config/fish/completions/themectl.fish
"""

[tasks."install:windows"]
description = "Build, install to ~/bin/themectl.exe (windows)"
depends = ["build"]
run = """
move themectl %USERPROFILE%\\bin\\themectl.exe
"""

[tasks.test]
description = "Run the test suite"
run = "gotestsum ./..."

[tasks.lint]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Run tests and lint"
depends = ["test", "lint"]

[tasks."release:snapshot"]
description = "Build a local snapshot release with goreleaser"
run = "goreleaser release --snapshot --clean"

[tasks.release]
description = "Tag the next version (derived from conventional commits) and push to trigger the release workflow"
usage = 'arg "[bump]" default="next" help="next|major|minor|patch"'
run = """
set -e
current=$(svu current)
next=$(svu "$usage_bump")
if [ "$next" = "$current" ]; then
  echo "nothing to release since $current" >&2
  exit 1
fi
echo "releasing $current -> $next"
git tag -m "$next" "$next"
git push origin "$next"
"""

[tasks."schema:gen"]
description = "Generate JSON schemas from Go structs"
alias = "gen"
run = "go generate ./..."

[tasks."schema:check"]
description = "Regenerate JSON schemas and fail on drift"
depends = ["schema:gen"]
run = "git diff --exit-code schemas/"
