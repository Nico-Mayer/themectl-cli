name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
      - name: Test and lint
        run: mise run check
      - name: Schemas match Go types
        run: mise run schema:check
